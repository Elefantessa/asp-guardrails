services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: guardrails
      POSTGRES_USER: cloudway
      POSTGRES_PASSWORD: cloudway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudway -d guardrails"]
      interval: 5s
      timeout: 5s
      retries: 5

  grafana-lgtm:
    image: grafana/otel-lgtm
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"

volumes:
  postgres_data:
